<!DOCTYPE html>
<!--Eunice Kaseu 07/16/2026-->
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Contact Us</title>
        <link rel="stylesheet" href="styles.css">
    </head>
<body>
    <div class="container">
        <header>
            <img src="logo-1.webp" >
            <h2>Contact Us </h2>
            <p>Please complete the form below.</p>
            <main>
                <form action="https://webdevbasics.net/scripts/demo.php" method="post">
                    <div class="form-group">
                        <label for="firstName">First Name: </label>
                        <input type="text" id="firstName" name="firstName" maxlength="30" required>
                    </div>

                   <div class="form-group">
                        <label for="LastName">Last Name:</label>
                        <input type="text" id="LastName" maxlength="30"required>
                   </div>

                    <div class="form-group">
                        <label for="Email">Email:</label>
                        <input type="email" id="email"name="email"required>
                    </div>

                    <div class="form-group">
                        <label for="Phone">Phone:</label>
                        <input type="tel"
                        id="phone" 
                        name="phone" placeholder="123-456-7890" >
                    </div>
                    
                    <div class="form-group">
                        <label> How will you prefer we contact you? </label>
                        <div class="contact-options">
                            <div class="radio-option">
                                <input type="radio" id="contactEmail" 
                                name="contactPreference" value="Email"required>
                                <label for="contactEmail">Email</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="contactText" 
                                name="contactPreference" value="Text" required>
                                <label for="contactText">Text</label>
                            </div>
                                
                            <div class="radio-option">
                                <input type="radio" id="contactNoPreference" 
                                name="contactPreference" value="NoPreference"required>
                                <label for="contactNoPreference">No Preference</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <button type="submit">Submit</button>

                    </div>
                        

                </form>
            </main>
            <footer>
                <p>&copy;2026 Eunice Kaseu All rights reserved.</p>
            </footer>
    
        </header>
    </div>
</body>
