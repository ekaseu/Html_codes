<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Top 10 List</title>
    <link rel="stylesheet" href="fav.css">
</head>
<body>

<header>
    <h1>My Top 10 Favorites</h1>
    <h2>cars</h2>
</header>

<main>
    <!-- w3c validator recommends using a div instead of section because there's no heading -->
    <section class="grid-wrapper">
        <figure>
            <img src="Grid-photos/bugatti.jpg" alt="cars">
            <figcaption>Bugatti</figcaption>
        </figure>
        <figure>
            <img src="Grid-photos/eoys.jpg" alt="cars">
            <figcaption>Eoys</figcaption>
        </figure>
        <figure class="big">
            <img src="Grid-photos/jaguar.jpg" alt="cars">
            <figcaption>Jaguar</figcaption>
        </figure>
        <figure>
            <img src="Grid-photos/lexus.jpg" alt="cars">
            <figcaption>Lexus</figcaption>
        </figure>
        <figure>
            <img src="Grid-photos/lincoln.jpg" alt="cars">
            <figcaption>Lincoln</figcaption>
        </figure>
        <figure class="tall">
            <img src="Grid-photos/maserati.jpg" alt="cars">
            <figcaption>Maserati</figcaption>
        </figure>
        <figure>
            <img src="Grid-photos/mercedes%20benz%20sprinter.jpg" alt="cars">
            <figcaption>Mercedes benz sprinter</figcaption>
        </figure>
        <figure class="wide">
            <img src="Grid-photos/porsche.jpg" alt="cars">
            <figcaption>Porsche</figcaption>
        </figure>
        <figure>
            <img src="Grid-photos/spectre.jpg" alt="cars">
            <figcaption>Spectra</figcaption>
        </figure>
        <figure>
            <img src="Grid-photos/porshe2.jpg" alt="cars">
            <figcaption>porshe2</figcaption>
        </figure>
     </section>
</main>
</body>
</html>
